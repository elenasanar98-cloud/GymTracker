workflows:
  ios-release:
    name: GymTracker iOS (sin firma - AltStore)
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_PROJECT: "GymTracker.xcodeproj"
        XCODE_SCHEME: "GymTracker"
      xcode: latest

    scripts:
      - name: Build iOS app (sin firma de código)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Empaquetar IPA sin firma
        script: |
          APP_PATH=$(find DerivedData/Build -name "*.app" -not -path "*/simulator/*" | head -1)
          echo "App encontrada en: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/GymTracker.app
          zip -r GymTracker.ipa Payload/
          echo "IPA creado: $(du -sh GymTracker.ipa)"

    artifacts:
      - GymTracker.ipa
