workflows:
  ios-release:
    name: GymTracker iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gymtracker.app
      vars:
        XCODE_PROJECT: "GymTracker.xcodeproj"
        XCODE_SCHEME: "GymTracker"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA (unsigned)
        script: |
          APP_PATH=$(find DerivedData -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r GymTracker.ipa Payload/
          echo "IPA created: GymTracker.ipa"

    artifacts:
      - GymTracker.ipa
      - DerivedData/Logs/**/*.xcresult
